<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Job Finder</title>
<style>
:root{--bg:#071018;--card:#111a24;--card2:#172433;--text:#f5f8fc;--muted:#aab7c6;--accent:#69e6a3;--danger:#ff6b6b;--warn:#ffd166;--line:#263647;--blue:#7fbeff}*{box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#071018;color:#f5f8fc;margin:0;padding:16px 16px 90px}h1{margin:0 0 4px;font-size:28px}.muted{color:var(--muted);line-height:1.35}.card{background:#111a24;border:1px solid #263647;border-radius:18px;padding:16px;margin:14px 0}.job{background:#172433;border:1px solid #263647;border-radius:16px;padding:14px;margin:12px 0}button{background:#69e6a3;color:#06140b;border:0;border-radius:14px;padding:13px 15px;font-weight:850;font-size:16px;width:100%;margin:6px 0;cursor:pointer}button.secondary{background:#172433;color:#e2ebf6;border:1px solid #263647}button.danger{background:rgba(255,107,107,.15);color:#ffb2b2;border:1px solid rgba(255,107,107,.45)}input,select,textarea{width:100%;background:#081019;color:#f5f8fc;border:1px solid #263647;border-radius:14px;padding:12px;font-size:16px;margin:6px 0 12px}textarea{min-height:92px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}.cats{display:grid;grid-template-columns:1fr 1fr;gap:8px}.cat{background:#0d1620;color:#cbd8e6;border:1px solid #263647}.cat.on{background:rgba(105,230,163,.16);color:#69e6a3;border-color:#69e6a3}.pill{display:inline-block;border:1px solid #263647;border-radius:999px;padding:5px 8px;margin:4px 4px 4px 0;font-size:12px}.green{color:#69e6a3}.red{color:#ff6b6b}.warn{color:#ffd166}.score{float:right;font-size:30px;font-weight:950}.sticky{position:sticky;top:0;background:rgba(7,16,24,.93);backdrop-filter:blur(14px);padding:12px 0;z-index:3;border-bottom:1px solid rgba(255,255,255,.07)}a{color:#7fbeff}.small{font-size:13px}.row{display:flex;gap:8px}.row button{flex:1}.hidden{display:none}.translated{border-left:3px solid #69e6a3;padding-left:9px}.orig{font-size:12px;color:#aab7c6;margin-top:8px}.footer{position:fixed;bottom:0;left:0;right:0;background:rgba(7,16,24,.94);backdrop-filter:blur(14px);padding:10px 16px;display:flex;gap:8px;border-top:1px solid rgba(255,255,255,.08)}.footer button{flex:1}@media(min-width:760px){body{max-width:760px;margin:auto}.footer{max-width:760px;margin:auto}}
</style>
</head>
<body>
<div class="sticky"><h1>Auto Job Finder</h1><div class="muted">Finds jobs, translates foreign listings, hides bad fits, and sorts by your best categories.</div></div>
<div class="card">
<h2>Choose job categories</h2>
<div class="cats" id="cats"></div>
<label>Minimum pay</label><input id="minPay" type="number" value="45000">
<div class="grid"><label><input id="translateOn" type="checkbox" checked style="width:auto"> Auto translate</label><label><input id="englishOnly" type="checkbox" style="width:auto"> Hide non-English if translation fails</label></div>
<button id="find">Find Jobs Now</button><button id="savedBtn" class="secondary">Saved Jobs</button><p id="status" class="muted">Ready.</p>
</div>
<div class="card"><h2>Filters</h2><b>Hard no words</b><textarea id="bad">call center, cold calling, door to door, commission only, insurance sales, financial advisor, unpaid, internship, senior, director, principal, overnight, rotating weekends, customer complaints, high volume phone, strict no headphones, nursing, CDL, truck driver, german required, french required, spanish required</textarea><b>Green flag words</b><textarea id="good">shopify, e-commerce, ecommerce, product design, 3d printing, blender, meta ads, paid social, marketing coordinator, creative, content, operations, inventory, fulfillment, remote, hybrid, small team, startup, independent, flexible</textarea></div>
<div id="results"></div>
<div class="footer"><button id="find2">Find Jobs</button><button id="topBtn" class="secondary">Top</button></div>
<script>
const $=id=>document.getElementById(id);
const categories={
 'E-commerce / Shopify':['shopify','ecommerce','e-commerce','marketplace','product listing','amazon marketplace','etsy'],
 'Marketing / Paid Social':['marketing coordinator','paid social','meta ads','facebook ads','content marketing','creative strategist'],
 '3D / Product Design':['3d','3d printing','product design','blender','prototype','cad','industrial design'],
 'Operations / Inventory':['operations coordinator','inventory','fulfillment','supply chain','ecommerce operations','logistics coordinator'],
 'Creative Content':['content creator','creative assistant','social media assistant','brand content','video editor'],
 'Remote Beginner Friendly':['remote assistant','remote coordinator','junior marketing','entry level ecommerce','operations assistant']
};
let saved=JSON.parse(localStorage.getItem('savedJobsV2')||'[]');
let lastResults=[];
function initCats(){let box=$('cats');Object.keys(categories).forEach((c,i)=>{let b=document.createElement('button');b.className='cat '+(i<4?'on':'');b.textContent=c;b.onclick=()=>b.classList.toggle('on');box.appendChild(b)})}
function activeCats(){return [...document.querySelectorAll('.cat.on')].map(b=>b.textContent)}
function queries(){let out=[];activeCats().forEach(c=>out.push(...categories[c]));return [...new Set(out)].slice(0,12)}
function words(id){return $(id).value.split(',').map(x=>x.trim().toLowerCase()).filter(Boolean)}
function strip(h){let d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').replace(/\s+/g,' ').trim()}
function pay(t){t=String(t||'').replace(/,/g,'');let a=[...t.matchAll(/\$?\b([4-9]\d|1\d\d|2\d\d)\s?k\b/gi)].map(m=>+m[1]*1000);let b=[...t.matchAll(/\$?\b([4-9]\d{4}|1\d{5}|2\d{5})\b/g)].map(m=>+m[1]);let n=[...a,...b].filter(x=>x>20000&&x<300000);return n.length?Math.max(...n):0}
async function get(url){try{let r=await fetch(url);if(!r.ok)throw Error(r.status);return await r.json()}catch(e){console.log(e);return null}}
function detectLang(text){text=(text||'').slice(0,1200).toLowerCase();let foreign=[' der ',' die ',' und ',' für ',' mit ',' ein ',' eine ',' nicht ',' chez ',' vous ',' nous ',' pour ',' avec ',' dans ',' des ',' les ',' du ',' de la ',' para ',' con ',' experiencia ',' trabajo ',' empresa ',' remoto ',' en ',' el ',' la ',' los ',' las ',' und ',' zur ',' aufgaben ',' profil '];let hits=foreign.filter(w=>text.includes(w)).length;let ascii=(text.match(/[a-z]/g)||[]).length, non=(text.match(/[àáâäãåçèéêëìíîïñòóôöõùúûüß]/g)||[]).length;if(non>8||hits>4)return 'non-en';return 'en'}
async function translateText(text){if(!$('translateOn').checked||detectLang(text)==='en')return {text,translated:false,failed:false};let chunk=text.slice(0,900);try{let url='https://api.mymemory.translated.net/get?q='+encodeURIComponent(chunk)+'&langpair=auto|en';let j=await get(url);let translated=j&&j.responseData&&j.responseData.translatedText;if(translated&&translated.toLowerCase()!==chunk.toLowerCase())return {text:translated,translated:true,failed:false,original:chunk}}catch(e){}return {text,translated:false,failed:true}}
function score(j){let bad=words('bad'),good=words('good'),min=+$('minPay').value||0,text=(j.title+' '+j.company+' '+j.location+' '+j.desc+' '+(j.tags||[]).join(' ')).toLowerCase(),reject=[],green=[],score=35,reasons=[];bad.forEach(w=>{if(text.includes(w))reject.push(w)});if(j.pay&&j.pay<min)reject.push('pay below minimum');if($('englishOnly').checked&&j.translationFailed&&detectLang(j.desc)!=='en')reject.push('translation failed');if(/\b(senior|sr\.|director|principal|staff|vp|head of)\b/i.test(j.title))reject.push('too senior');if(/\b(intern|unpaid|volunteer)\b/i.test(text))reject.push('not a paid fit');good.forEach(w=>{if(text.includes(w)){score+=4;green.push(w)}});activeCats().forEach(cat=>{if(categories[cat].some(q=>text.includes(q.toLowerCase()))){score+=10;reasons.push(cat)}});if(/remote|work from home|anywhere/i.test(text)){score+=18;reasons.push('remote')};if(/shopify|ecommerce|e-commerce|etsy|amazon/i.test(text)){score+=18;reasons.push('e-commerce')};if(/3d printing|blender|cad|prototype|product design/i.test(text)){score+=22;reasons.push('3D/product')};if(/marketing|paid social|meta ads|content|creative/i.test(text)){score+=16;reasons.push('marketing')};if(/inventory|operations|fulfillment|logistics/i.test(text)){score+=10;reasons.push('ops')};if(/phone|calls|quota|commission|overnight|weekend/i.test(text)){score-=25;reasons.push('annoyance risk')};return{score:Math.max(0,Math.min(100,Math.round(score))),reject:[...new Set(reject)],green:[...new Set(green)].slice(0,6),reasons:[...new Set(reasons)].slice(0,5)}}
async function normalizeAndTranslate(j){let full=(j.title+'. '+j.desc).slice(0,1000);let tr=await translateText(full);if(tr.translated){let parts=tr.text.split('. ');j.titleTranslated=parts[0]||j.title;j.desc=tr.text;j.translated=true;j.original=tr.original}else if(tr.failed){j.translationFailed=true}return j}
async function findJobs(){localStorage.setItem('bad',$('bad').value);localStorage.setItem('good',$('good').value);$('results').innerHTML='';$('status').textContent='Searching categories: '+activeCats().join(', ');let all=[];for(let q of queries()){let r=await get('https://remotive.com/api/remote-jobs?search='+encodeURIComponent(q));if(r&&r.jobs)all.push(...r.jobs.map(x=>({id:'r'+x.id,source:'Remotive',title:x.title,company:x.company_name,location:x.candidate_required_location||'Remote',url:x.url,tags:x.tags||[],desc:strip(x.description),pay:pay((x.salary||'')+' '+x.description)})))}$('status').textContent='Searching extra public feed...';let a=await get('https://www.arbeitnow.com/api/job-board-api');if(a&&a.data)all.push(...a.data.map(x=>({id:'a'+(x.slug||x.url),source:'Arbeitnow',title:x.title,company:x.company_name,location:x.location||'Unknown',url:x.url,tags:x.tags||[],desc:strip(x.description),pay:pay(x.description)})));let seen=new Set();all=all.filter(j=>{let k=(j.title+'|'+j.company).toLowerCase();if(seen.has(k))return false;seen.add(k);return true});$('status').textContent='Translating non-English listings...';let translated=[];for(let i=0;i<Math.min(all.length,180);i++){if(i%15===0)$('status').textContent='Translating/scoring '+i+' of '+Math.min(all.length,180)+'...';translated.push(await normalizeAndTranslate(all[i]))}lastResults=translated.map(j=>({...j,fit:score(j)})).sort((a,b)=>b.fit.score-a.fit.score);render(lastResults);$('status').textContent='Done. Showing '+lastResults.filter(j=>!j.fit.reject.length).length+' matches. Hid '+lastResults.filter(j=>j.fit.reject.length).length+'.'}
function render(jobs){let shown=jobs.filter(j=>!j.fit.reject.length);$('results').innerHTML=shown.length?'':'<div class="card">No matches found. Try more categories, lower pay, or turn off English-only.</div>';shown.slice(0,60).forEach(j=>{let div=document.createElement('div');div.className='job';let title=j.titleTranslated||j.title;div.innerHTML='<span class="score green">'+j.fit.score+'</span><b>'+title+'</b><p class="muted">'+j.company+' • '+j.location+' • '+j.source+(j.pay?' • est. $'+j.pay.toLocaleString():'')+'</p>'+(j.translated?'<span class="pill green">translated to English</span>':j.translationFailed?'<span class="pill warn">translation unavailable</span>':'')+'<p class="'+(j.translated?'translated':'')+'">'+j.desc.slice(0,360)+'...</p><p>'+j.fit.green.map(x=>'<span class="pill green">'+x+'</span>').join('')+j.fit.reasons.map(x=>'<span class="pill">'+x+'</span>').join('')+'</p>'+(j.original?'<details class="orig"><summary>Original text</summary>'+j.original+'</details>':'')+'<button class="secondary">Apply / View</button><button>Save</button><button class="danger">Hide company</button>';let btns=div.querySelectorAll('button');btns[0].onclick=()=>window.open(j.url,'_blank');btns[1].onclick=()=>{saved.unshift(j);localStorage.setItem('savedJobsV2',JSON.stringify(saved));alert('Saved')};btns[2].onclick=()=>{$('bad').value+=', '+j.company.toLowerCase();alert('Company added to hard-no words')};$('results').appendChild(div)})}
function showSaved(){render(saved.map(j=>({...j,fit:j.fit||score(j)})))}
initCats();$('find').onclick=findJobs;$('find2').onclick=findJobs;$('savedBtn').onclick=showSaved;$('topBtn').onclick=()=>scrollTo(0,0);if(localStorage.getItem('bad'))$('bad').value=localStorage.getItem('bad');if(localStorage.getItem('good'))$('good').value=localStorage.getItem('good');
</script>
</body></html>
