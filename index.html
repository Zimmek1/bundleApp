<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Auto Job Finder</title><style>body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#071018;color:#f5f8fc;margin:0;padding:18px}.card{background:#111a24;border:1px solid #263647;border-radius:18px;padding:16px;margin:14px 0}button{background:#69e6a3;color:#06140b;border:0;border-radius:14px;padding:13px 15px;font-weight:800;font-size:16px;width:100%;margin:6px 0}button.secondary{background:#172433;color:#e2ebf6;border:1px solid #263647}input,select,textarea{width:100%;box-sizing:border-box;background:#081019;color:#f5f8fc;border:1px solid #263647;border-radius:14px;padding:12px;font-size:16px;margin:6px 0 12px}.job{background:#172433;border:1px solid #263647;border-radius:16px;padding:14px;margin:12px 0}.muted{color:#aab7c6}.pill{display:inline-block;border:1px solid #263647;border-radius:999px;padding:5px 8px;margin:4px;font-size:12px}.green{color:#69e6a3}.red{color:#ff6b6b}.score{float:right;font-size:30px;font-weight:900}.hidden{display:none}</style></head><body><h1>Auto Job Finder</h1><p class="muted">Searches live public job feeds, hides bad fits, and shows matches.</p><div class="card"><label>Search focus</label><select id="focus"><option value="best">Best fit</option><option value="ecommerce">E-commerce / Shopify</option><option value="marketing">Marketing</option><option value="design">3D / Product Design</option><option value="operations">Operations</option></select><label>Minimum pay</label><input id="minPay" type="number" value="45000"><button id="find">Find Jobs Now</button><button id="showSaved" class="secondary">Saved Jobs</button><p id="status" class="muted">Ready.</p></div><div class="card"><b>Hard no words</b><textarea id="bad">call center, cold calling, door to door, commission only, insurance sales, financial advisor, unpaid, internship, senior, director, principal, overnight, rotating weekends, customer complaints, high volume phone, strict no headphones, nursing, CDL, truck driver</textarea><b>Green flag words</b><textarea id="good">shopify, e-commerce, ecommerce, product design, 3d printing, blender, meta ads, paid social, marketing coordinator, creative, content, operations, inventory, fulfillment, remote, hybrid, small team, startup, independent, flexible</textarea></div><div id="results"></div><script>const $=id=>document.getElementById(id);const qs={best:['shopify','ecommerce','marketing','product design','operations','inventory','3d','creative'],ecommerce:['shopify','ecommerce','e-commerce','marketplace'],marketing:['marketing coordinator','paid social','meta ads','content marketing'],design:['3d','product design','blender','prototype'],operations:['operations coordinator','inventory','fulfillment','supply chain']};let saved=JSON.parse(localStorage.getItem('savedJobs')||'[]');function words(id){return $(id).value.split(',').map(x=>x.trim().toLowerCase()).filter(Boolean)}function strip(h){let d=document.createElement('div');d.innerHTML=h||'';return (d.textContent||'').replace(/\s+/g,' ').trim()}function pay(t){t=String(t||'').replace(/,/g,'');let a=[...t.matchAll(/\$?\b([4-9]\d|1\d\d|2\d\d)\s?k\b/gi)].map(m=>+m[1]*1000);let b=[...t.matchAll(/\$?\b([4-9]\d{4}|1\d{5}|2\d{5})\b/g)].map(m=>+m[1]);let n=[...a,...b].filter(x=>x>20000&&x<300000);return n.length?Math.max(...n):0}async function get(url){try{let r=await fetch(url);if(!r.ok)throw Error(r.status);return await r.json()}catch(e){console.log(e);return null}}function score(j){let bad=words('bad'),good=words('good'),min=+$('minPay').value||0,text=(j.title+' '+j.company+' '+j.location+' '+j.desc+' '+(j.tags||[]).join(' ')).toLowerCase(),reject=[],green=[],score=35,reasons=[];bad.forEach(w=>{if(text.includes(w))reject.push(w)});if(j.pay&&j.pay<min)reject.push('pay below minimum');if(/\b(senior|sr\.|director|principal|staff|vp|head of)\b/i.test(j.title))reject.push('too senior');if(/\b(intern|unpaid|volunteer)\b/i.test(text))reject.push('not a paid fit');good.forEach(w=>{if(text.includes(w)){score+=4;green.push(w)}});if(/remote|work from home|anywhere/i.test(text)){score+=20;reasons.push('remote')};if(/shopify|ecommerce|e-commerce|etsy|amazon/i.test(text)){score+=18;reasons.push('e-commerce')};if(/3d printing|blender|cad|prototype|product design/i.test(text)){score+=22;reasons.push('3D/product')};if(/marketing|paid social|meta ads|content|creative/i.test(text)){score+=16;reasons.push('marketing')};if(/inventory|operations|fulfillment|logistics/i.test(text)){score+=10;reasons.push('ops')};if(/phone|calls|quota|commission|overnight|weekend/i.test(text)){score-=25;reasons.push('annoyance risk')};return{score:Math.max(0,Math.min(100,Math.round(score))),reject:[...new Set(reject)],green:[...new Set(green)].slice(0,6),reasons:[...new Set(reasons)]}}async function findJobs(){localStorage.setItem('bad',$('bad').value);localStorage.setItem('good',$('good').value);$('status').textContent='Searching live feeds...';$('results').innerHTML='';let focus=$('focus').value, queries=qs[focus]||qs.best, all=[];for(let q of queries.slice(0,5)){let r=await get('https://remotive.com/api/remote-jobs?search='+encodeURIComponent(q));if(r&&r.jobs)all.push(...r.jobs.map(x=>({id:'r'+x.id,source:'Remotive',title:x.title,company:x.company_name,location:x.candidate_required_location||'Remote',url:x.url,tags:x.tags||[],desc:strip(x.description),pay:pay((x.salary||'')+' '+x.description)})))}let a=await get('https://www.arbeitnow.com/api/job-board-api');if(a&&a.data)all.push(...a.data.map(x=>({id:'a'+(x.slug||x.url),source:'Arbeitnow',title:x.title,company:x.company_name,location:x.location||'Unknown',url:x.url,tags:x.tags||[],desc:strip(x.description),pay:pay(x.description)})));let seen=new Set();all=all.filter(j=>{let k=(j.title+'|'+j.company).toLowerCase();if(seen.has(k))return false;seen.add(k);return true}).map(j=>({...j,fit:score(j)})).sort((a,b)=>b.fit.score-a.fit.score);render(all);$('status').textContent='Done. Showing '+all.filter(j=>!j.fit.reject.length).length+' matches. Hid '+all.filter(j=>j.fit.reject.length).length+'.'}function render(jobs){let shown=jobs.filter(j=>!j.fit.reject.length);$('results').innerHTML=shown.length?'':'<div class="card">No matches found. Try a different focus or lower the pay minimum.</div>';shown.slice(0,50).forEach(j=>{let div=document.createElement('div');div.className='job';div.innerHTML='<span class="score green">'+j.fit.score+'</span><b>'+j.title+'</b><p class="muted">'+j.company+' • '+j.location+' • '+j.source+(j.pay?' • est. $'+j.pay.toLocaleString():'')+'</p><p>'+j.desc.slice(0,260)+'...</p><p>'+j.fit.green.map(x=>'<span class="pill green">'+x+'</span>').join('')+'</p><button class="secondary">Apply / View</button><button>Save</button>';div.querySelectorAll('button')[0].onclick=()=>window.open(j.url,'_blank');div.querySelectorAll('button')[1].onclick=()=>{saved.unshift(j);localStorage.setItem('savedJobs',JSON.stringify(saved));alert('Saved')};$('results').appendChild(div)})}function showSaved(){render(saved.map(j=>({...j,fit:j.fit||score(j)})))}$('find').onclick=findJobs;$('showSaved').onclick=showSaved;if(localStorage.getItem('bad'))$('bad').value=localStorage.getItem('bad');if(localStorage.getItem('good'))$('good').value=localStorage.getItem('good');</script></body></html>
